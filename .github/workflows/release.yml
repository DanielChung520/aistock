name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: app,dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: app,dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: appimage,deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi,nsis
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile
      - name: Build & Sign
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'aiStock ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

  publish-updater-json:
    name: Publish latest.json
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: '*'
          path: artifacts
          merge-multiple: true
      - name: Generate latest.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const version = context.ref.replace(/^refs\/tags\/v/, '');

            // Find all .sig files in artifacts/
            const sigFiles = {};
            function walk(dir, base = dir) {
              if (!fs.existsSync(dir)) return;
              for (const f of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, f.name);
                if (f.isDirectory()) walk(p, base);
                else if (f.name.endsWith('.sig')) {
                  const rel = path.relative(base, p);
                  sigFiles[rel] = fs.readFileSync(p, 'utf8').trim();
                }
              }
            }
            walk('artifacts');
            console.log('Found signatures:', Object.keys(sigFiles));

            // Tauri updater v2 platform keys
            const platformMap = {
              'darwin-aarch64': /aarch64-apple-darwin|macos-aarch64|aarch64\.dmg/,
              'darwin-x86_64': /x86_64-apple-darwin|macos-x86_64|x64\.dmg/,
              'linux-x86_64': /x86_64-unknown-linux|linux-x86_64|x86_64\.AppImage|amd64\.AppImage/,
              'windows-x86_64': /x86_64-pc-windows|windows-x86_64|x64-setup\.exe/,
            };

            const platforms = {};
            for (const [platform, pattern] of Object.entries(platformMap)) {
              const sigFile = Object.keys(sigFiles).find(f => pattern.test(f));
              if (sigFile) {
                platforms[platform] = { signature: sigFiles[sigFile] };
              }
            }

            const json = {
              version,
              notes: 'See GitHub release for details.',
              pub_date: new Date().toISOString(),
              platforms,
            };

            fs.writeFileSync('artifacts/latest.json', JSON.stringify(json, null, 2));
            console.log('Wrote latest.json:', JSON.stringify(json, null, 2));
      - name: Upload latest.json to release
        uses: actions/upload-artifact@v4
        with:
          name: latest-json
          path: artifacts/latest.json
