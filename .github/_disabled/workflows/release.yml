name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.2.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            bundle: app,dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            bundle: app,dmg
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bundle: appimage,deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundle: msi,nsis
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install pnpm deps
        run: pnpm install --frozen-lockfile
      - name: Build & Sign
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          tagName: ${{ github.ref_name }}
          releaseName: 'aiStock ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }} --bundles ${{ matrix.bundle }}

  publish-updater-json:
    name: Publish latest.json
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate latest.json
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const version = context.ref.replace(/^refs\/tags\/v/, '');
            
            // Collect signature files (created by tauri-action for updater)
            const sigFiles = {};
            function walk(dir) {
              for (const f of fs.readdirSync(dir, { withFileTypes: true })) {
                const p = path.join(dir, f.name);
                if (f.isDirectory()) walk(p);
                else if (f.name.endsWith('.sig')) {
                  // e.g. aiStock_0.2.0_x64-setup.exe.sig
                  sigFiles[f.name] = fs.readFileSync(p, 'utf8').trim();
                }
              }
            }
            walk('artifacts');
            console.log('Found signatures:', Object.keys(sigFiles));
            
            // Build platforms map (Tauri updater v2 format)
            const platforms = {};
            for (const [name, sig] of Object.entries(sigFiles)) {
              let key = '';
              if (name.includes('aarch64-apple-darwin') || name.includes('macos-aarch64')) key = 'darwin-aarch64';
              else if (name.includes('x86_64-apple-darwin') || name.includes('macos-x86_64')) key = 'darwin-x86_64';
              else if (name.includes('x86_64-unknown-linux') || name.includes('linux-x86_64')) key = 'linux-x86_64';
              else if (name.includes('x86_64-pc-windows') || name.includes('windows-x86_64')) key = 'windows-x86_64';
              if (key) platforms[key] = { signature: sig };
            }
            
            const json = {
              version,
              notes: 'See CHANGELOG.md',
              pub_date: new Date().toISOString(),
              platforms,
            };
            
            fs.writeFileSync('artifacts/latest.json', JSON.stringify(json, null, 2));
            console.log('Wrote latest.json:', JSON.stringify(json, null, 2));
      - name: Upload latest.json
        uses: actions/upload-artifact@v4
        with:
          name: updater-latest-json
          path: artifacts/latest.json
